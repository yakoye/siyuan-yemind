<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>YeMind 布局缩略图预览</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 28px; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #1f2937; background: #f7f8fa; }
  main { max-width: 960px; margin: auto; }
  h1 { margin: 0 0 24px; font-size: 24px; }
  h2 { margin: 28px 0 12px; font-size: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(132px, 1fr)); gap: 12px; }
  figure { margin: 0; padding: 14px 10px 12px; border: 1px solid #e4e7ec; border-radius: 9px; background: white; text-align: center; }
  .icon { height: 48px; display: grid; place-items: center; }
  img { width: 40px; height: 32px; image-rendering: auto; }
  figcaption { margin-top: 8px; font-size: 12px; color: #475467; }
</style>
</head>
<body><main><h1>YeMind 布局缩略图：绿色主题</h1><section><h2>思维导图（逻辑图）</h2><div class="grid"><figure><div class="icon"><img src="01_mindmap/01_mindmap.svg" alt="思维导图"></div><figcaption>思维导图</figcaption></figure><figure><div class="icon"><img src="01_mindmap/02_reverse-mindmap.svg" alt="逆向导图"></div><figcaption>逆向导图</figcaption></figure><figure><div class="icon"><img src="01_mindmap/03_balanced-down.svg" alt="双向平衡向下"></div><figcaption>双向平衡向下</figcaption></figure><figure><div class="icon"><img src="01_mindmap/04_right-mindmap.svg" alt="右向导图"></div><figcaption>右向导图</figcaption></figure><figure><div class="icon"><img src="01_mindmap/05_left-mindmap.svg" alt="左向导图"></div><figcaption>左向导图</figcaption></figure></div></section><section><h2>树状图</h2><div class="grid"><figure><div class="icon"><img src="02_tree/01_tree-right-down.svg" alt="树状图（右下）"></div><figcaption>树状图（右下）</figcaption></figure><figure><div class="icon"><img src="02_tree/02_tree-left-down.svg" alt="树状图（左下）"></div><figcaption>树状图（左下）</figcaption></figure><figure><div class="icon"><img src="02_tree/03_tree-down-symmetric.svg" alt="树状图（向下对称）"></div><figcaption>树状图（向下对称）</figcaption></figure><figure><div class="icon"><img src="02_tree/04_tree-up-symmetric.svg" alt="树状图（向上对称）"></div><figcaption>树状图（向上对称）</figcaption></figure><figure><div class="icon"><img src="02_tree/05_tree-right-up.svg" alt="树状图（右上）"></div><figcaption>树状图（右上）</figcaption></figure><figure><div class="icon"><img src="02_tree/06_tree-left-up.svg" alt="树状图（左上）"></div><figcaption>树状图（左上）</figcaption></figure></div></section><section><h2>时间轴</h2><div class="grid"><figure><div class="icon"><img src="03_timeline/01_timeline-right.svg" alt="时间轴（向右）"></div><figcaption>时间轴（向右）</figcaption></figure><figure><div class="icon"><img src="03_timeline/02_timeline-left.svg" alt="时间轴（向左）"></div><figcaption>时间轴（向左）</figcaption></figure><figure><div class="icon"><img src="03_timeline/03_timeline-down.svg" alt="时间轴（向下）"></div><figcaption>时间轴（向下）</figcaption></figure><figure><div class="icon"><img src="03_timeline/04_timeline-up.svg" alt="时间轴（向上）"></div><figcaption>时间轴（向上）</figcaption></figure><figure><div class="icon"><img src="03_timeline/05_timeline-s.svg" alt="时间轴（S型）"></div><figcaption>时间轴（S型）</figcaption></figure></div></section><section><h2>组织结构图</h2><div class="grid"><figure><div class="icon"><img src="04_organization/01_organization-down.svg" alt="组织结构图（向下）"></div><figcaption>组织结构图（向下）</figcaption></figure><figure><div class="icon"><img src="04_organization/02_organization-bidirectional.svg" alt="组织结构图（上下双向）"></div><figcaption>组织结构图（上下双向）</figcaption></figure><figure><div class="icon"><img src="04_organization/03_organization-up.svg" alt="组织结构图（向上）"></div><figcaption>组织结构图（向上）</figcaption></figure></div></section><section><h2>鱼骨图</h2><div class="grid"><figure><div class="icon"><img src="05_fishbone/01_fishbone-left.svg" alt="鱼骨图（左）"></div><figcaption>鱼骨图（左）</figcaption></figure><figure><div class="icon"><img src="05_fishbone/02_fishbone-right.svg" alt="鱼骨图（右）"></div><figcaption>鱼骨图（右）</figcaption></figure></div></section><section><h2>树形表格</h2><div class="grid"><figure><div class="icon"><img src="06_tree-table/01_tree-table-top-title.svg" alt="树形表格（顶部标题）"></div><figcaption>树形表格（顶部标题）</figcaption></figure><figure><div class="icon"><img src="06_tree-table/02_tree-table-left-title.svg" alt="树形表格（左侧标题）"></div><figcaption>树形表格（左侧标题）</figcaption></figure></div></section><section><h2>其他</h2><div class="grid"><figure><div class="icon"><img src="07_other/01_radial-sector.svg" alt="扇形放射图"></div><figcaption>扇形放射图</figcaption></figure><figure><div class="icon"><img src="07_other/02_circle.svg" alt="圆形图"></div><figcaption>圆形图</figcaption></figure><figure><div class="icon"><img src="07_other/03_bubble.svg" alt="气泡图"></div><figcaption>气泡图</figcaption></figure><figure><div class="icon"><img src="07_other/04_bracket-right.svg" alt="括号图（右）"></div><figcaption>括号图（右）</figcaption></figure><figure><div class="icon"><img src="07_other/05_bracket-left.svg" alt="括号图（左）"></div><figcaption>括号图（左）</figcaption></figure></div></section></main></body>
</html>
